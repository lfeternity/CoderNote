<svg width="280" height="496" viewBox="0 0 280 496" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="coverBase" x1="0" y1="0" x2="0" y2="496" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#BE7D3D"/>
      <stop offset="0.52" stop-color="#B17234"/>
      <stop offset="1" stop-color="#A8682E"/>
    </linearGradient>

    <linearGradient id="coverSheen" x1="0" y1="0" x2="280" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F6C48A" stop-opacity="0.2"/>
      <stop offset="0.2" stop-color="#F6C48A" stop-opacity="0.08"/>
      <stop offset="0.48" stop-color="#F6C48A" stop-opacity="0"/>
      <stop offset="0.78" stop-color="#FFDEB4" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#FFDEB4" stop-opacity="0"/>
    </linearGradient>

    <radialGradient id="coverVignette" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(140 248) rotate(90) scale(300 186)">
      <stop offset="0.58" stop-color="#5D3516" stop-opacity="0"/>
      <stop offset="1" stop-color="#542D12" stop-opacity="0.22"/>
    </radialGradient>

    <filter id="grain" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="1.2" numOctaves="2" seed="17" stitchTiles="stitch"/>
      <feColorMatrix
        type="matrix"
        values="0 0 0 0 0.24
                0 0 0 0 0.12
                0 0 0 0 0.03
                0 0 0 0.07 0"
      />
    </filter>
  </defs>

  <rect width="280" height="496" fill="url(#coverBase)"/>
  <rect width="280" height="496" fill="url(#coverSheen)"/>
  <rect width="280" height="496" fill="url(#coverVignette)"/>

  <rect x="14" y="0" width="2" height="496" fill="#D59A5A" opacity="0.42"/>
  <rect x="17" y="0" width="1" height="496" fill="#CA8C4B" opacity="0.55"/>

  <rect x="0" y="0" width="280" height="496" filter="url(#grain)" opacity="0.46"/>
</svg>
